<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskLite – Канбан</title>
  <link rel="stylesheet" href="css/kanban.style.css">
</head>
<body>
  <header class="header">
    <div class="container header_container">
      <div class="header_title">TaskLite</div>
      <nav class="tabs">
        <a href="index.html" class="tab">To Do</a>
        <a href="kanban.html" class="tab active">Kanban</a>
        <a href="habits.html" class="tab">Привычки</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <h1 class="page-title">Доска задач</h1>
    <div class="kanban-board">
      <!-- Колонка To Do -->
      <section class="column" data-status="todo">
        <header class="column__header">
          <h2>To Do</h2>
          <span class="column__count">0</span>
        </header>
        <div class="task-list"></div>
        <button class="add-task" type="button">+ Добавить задачу</button>
      </section>

      <!-- Колонка In Progress -->
      <section class="column" data-status="in-progress">
        <header class="column__header">
          <h2>In Progress</h2>
          <span class="column__count">0</span>
        </header>
        <div class="task-list"></div>
        <button class="add-task" type="button">+ Добавить задачу</button>
      </section>

      <!-- Колонка Done -->
      <section class="column" data-status="done">
        <header class="column__header">
          <h2>Done</h2>
          <span class="column__count">0</span>
        </header>
        <div class="task-list"></div>
        <button class="add-task" type="button">+ Добавить задачу</button>
      </section>
    </div>
  </main>
  <script src="kanban.js"></script>
</body>
</html>
