<!DOCTYPE html>
<html lang="ru">
  <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width-device-width, initial-scale-1" />
      <title>TaskLite - To Do</title>
      <link rel="stylesheet" href="css/style.css"/>
      <link rel="stylesheet" href="css/media.css"/>  
  </head>
  <body class="kanban">
      <header class="header">
        <div class="container header_container">
         <div class="header_title">TaskLite</div>
         <nav class="tabs">
         <a href="index.html" class="tab active">To Do</a>
         <a href="kanban.html" class="tab">Kanban</a>
         <a href="habits.html" class="tab">Привычки</a>
         </nav>
        </div>
      </header>
      <main class="container">
        <h1 class="page-title">To Do</h1>
        <div class="form-add">
          <input class="form-add_input" type="text" placeholder="введите задачу" />
          <button class="form-add_button" type="button">Добавить</button>
          </div>
          <div class="toolbar">
           <input class="toolbar_search" type="text" placeholder="Поиск задач..." />
          <div class="tabs toolbar_tabs"> 
           <button class="tabs_item tabs_item--active" type="button">Все</button> 
           <button class="tabs_item" type="button">Активные</button>
           <button class="tabs_item" type="button">Завершенные</button>
          </div>
          <select class="toolbar_sort">
             <option>Сначала старые</option>
             <option>Сначала новые</option>
             <option>Название A→Z</option>
             <option>Название Z→A</option>
          </select>
        </div>
        <div class="task">
          <div class="task_content">
            <div class="task_title">Пример задачи</div>
              <div class="task_meta">26.09.2025, 15:49</div>   
          </div>
          <div class="task_actions">
            <button class="task_action task_action--edit">
              <svg class="task__icon" viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="#6f64a3" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9" /><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z" /></svg>
            </button>
            <button class="task_action task_action-delete"><svg class="task__icon" viewBox="0 0 24 24" width="14 " height="14"fill="none" stroke="#cb6e6e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"> <polyline points="3 6 5 6 21 6" /> <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6" /><path d="M10 11v6" /><path d="M14 11v6" /><path d="M9 6V4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2" /> </svg>
            </button>
          </div>
        </div>
        <div class="footer-controls">
          <div class="footer-controls_counters">
            <span>Всего: 1</span>
            <span> 1</span>
            <span>Выполненных: 0</span>
          </div>
          <button class="button button-clear footer-controls_clear" type="button">
            Очистить выполненные
          </button>
        </div> 
      </main>
      <script src="script.js"></script>
  </body>    
</html>
